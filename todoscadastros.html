<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Administrativo - Shoes Cat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
        }
        .admin-header {
            background-color: #333;
            color: rgb(226, 219, 219);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-container {
            max-width: 800px;
            margin: 30px auto;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
        }
        .admin-btn {
            background-color: white;
            border: none;
            border-radius: 8px;
            padding: 20px;
            width: 250px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .admin-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 8px rgba(0,0,0,0.15);
        }
        .admin-btn img {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
        }
        .admin-btn h3 {
            margin: 0;
            color: #333;
        }
        .logout-btn {
            background-color: #f44336;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <header class="admin-header">
        <h1>Shoes Cat - Cadastros Administrativo</h1>
        <a href="menu.html" class="logout-btn">Sair</a>
    </header>

    <div class="admin-container">
        <button class="admin-btn">
            <h3>Cadastrar Produto</h3>
        </button>

        <button class="admin-btn">
            <h3>Cadastrar Tipo</h3>
        </button>

        <button class="admin-btn">
            <h3>Cadastrar Marca</h3>
        </button>

        <button class="admin-btn">
            <h3>Cadastrar Categoria</h3>
        </button>
    </div>
</body>
</html>
